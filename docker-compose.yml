services:
  app:
    container_name: nextjs-app
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: jejaku-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jejaku_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
